<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFXIV Skill Rotation Diff (MVP)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-row">
        <div>
          <h1 id="siteTitle">FFXIV スキル回し比較</h1>
          <p id="siteDesc">FFLogs URL 2件からスキル回しを比較するMVP</p>
        </div>
        <button id="langToggle" type="button" class="lang-btn">EN</button>
      </div>
    </header>

    <main>
      <section class="card" id="step1">
        <h2 id="step1Title">1. FFLogs連携 & ログURL入力</h2>
        <div class="oauth-row">
          <button id="connectBtn" type="button">FFLogsと連携（V2）</button>
          <button id="disconnectBtn" type="button" class="ghost">連携解除</button>
          <span id="authStatus" class="submessage">未連携</span>
        </div>
        <label id="logUrlALabel">ログURL A <input id="urlA" type="url" placeholder="https://ja.fflogs.com/reports/..." /></label>
        <label id="logUrlBLabel">ログURL B <input id="urlB" type="url" placeholder="https://ja.fflogs.com/reports/..." /></label>
        <button id="loadBtn">読み込み開始</button>
        <p id="step1Message" class="message"></p>
      </section>

      <section class="card hidden" id="step2">
        <h2 id="step2Title">2. 戦闘データ選択（Killのみ）</h2>
        <div class="player-grid">
          <label id="logAFightLabel">ログA 戦闘
            <select id="fightA"></select>
          </label>
          <label id="logBFightLabel">ログB 戦闘
            <select id="fightB"></select>
          </label>
        </div>
        <button id="loadPlayersBtn">この戦闘でプレイヤー一覧を取得</button>
        <p id="step2Message" class="submessage"></p>
      </section>

      <section class="card hidden" id="step3">
        <h2 id="step3Title">3. 比較プレイヤー選択</h2>
        <div class="player-grid">
          <label id="logAPlayerLabel">ログAプレイヤー
            <select id="playerA"></select>
          </label>
          <label id="logBPlayerLabel">ログBプレイヤー
            <select id="playerB"></select>
          </label>
        </div>
        <button id="compareBtn">比較開始</button>
      </section>

      <section class="card hidden" id="step4">
        <div class="step4-header">
          <h2 id="step4Title">4. 比較結果</h2>
          <div class="tabs">
            <button class="tab active" data-tab="all">全体TL</button>
            <button class="tab" data-tab="odd">奇数分TL</button>
            <button class="tab" data-tab="even">偶数分TL</button>
          </div>
          <div id="phaseContainer" class="phase-btns"></div>
          <div class="zoom-controls">
            <button id="zoomOutBtn" type="button">−</button>
            <span id="zoomLabel">200%</span>
            <button id="zoomInBtn" type="button">＋</button>
          </div>
        </div>
        <div id="timelineWrap" class="timeline-wrap"></div>
      </section>

      <section class="card" id="debug">
        <h2 id="debugTitle">Debug Log</h2>
        <pre id="debugLog" class="debug-log"></pre>
      </section>
    </main>

    <footer>
      <small id="footerNote">注: FFLogs V2(PKCE)で連携。まず戦闘を選んでからプレイヤーを選択します。</small>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
